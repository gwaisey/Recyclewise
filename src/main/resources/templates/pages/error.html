<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main>
    <section class="error-section">
        <div class="container">
            <div class="error-content">
                <div class="error-code" th:text="${errorCode}">404</div>
                <h1 class="error-title" th:text="${errorTitle}">Not Found</h1>
                <p class="error-message" th:text="${errorMessage}">The item you are looking for does not exist.</p>
                <p class="error-suggestion" th:text="${suggestion}">Try browsing the waste guide.</p>
                <a th:href="${backUrl}" class="btn-primary" th:text="${backLabel}">Go Back</a>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<style>
.error-section { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 80px 0; }
.error-content { text-align: center; max-width: 500px; margin: 0 auto; }
.error-code { font-family: 'Syne', sans-serif; font-size: 8rem; font-weight: 800; color: var(--cream-dark); line-height: 1; margin-bottom: 16px; }
.error-title { font-size: 2rem; color: var(--forest); margin-bottom: 12px; }
.error-message { color: var(--text-mid); font-size: 1rem; margin-bottom: 8px; }
.error-suggestion { color: var(--text-light); font-size: 0.875rem; margin-bottom: 36px; }
</style>
</body>
</html>
