<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-cream">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main>

  <!-- Dashboard Overview -->
  <section class="dashboard-hero" style="padding: 40px 0; background: var(--forest);">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <div class="user-welcome">
        <p style="color:rgba(255,255,255,0.6); font-size:0.85rem; margin-bottom:4px;">Account Overview</p>
        <h1 style="font-family:'Syne',sans-serif; color:white; font-size:2.4rem; margin:0;" th:text="${user.fullName}">User</h1>
        <p style="color:var(--lime); font-size:1rem; font-weight:700; margin-top:8px;">
           <span th:text="${user.totalPoints}">0</span> Points Balance
        </p>
      </div>
      <div style="display:flex; gap:16px;">
        <a href="/stations" class="btn-primary" style="padding: 12px 24px;">Submit Trash</a>
        <a href="/rewards" class="btn-outline" style="border-color:white; color:white; padding: 12px 24px;">Redeem</a>
      </div>
    </div>
  </section>

  <!-- Dashboard Content -->
  <section style="padding: 60px 0 100px;">
    <div class="container">
      <div th:if="${success}" class="alert alert-success" th:text="${success}" style="margin-bottom:32px;"></div>
      
      <div style="display: grid; grid-template-columns: 1.6fr 1.2fr; gap: 40px; align-items: start;">

        <!-- Submission History -->
        <div style="background: white; border-radius: 16px; border: 1px solid var(--cream-dark); padding: 32px;">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:24px; border-bottom: 1px solid var(--cream-dark); padding-bottom: 12px;">
            <h2 style="font-family:'Syne',sans-serif; font-size: 1.25rem; color: var(--forest); margin: 0;">Submission History</h2>
            <span style="font-size: 0.8rem; color: var(--sage); font-weight: 500;">Recent activities</span>
          </div>
          
          <div th:if="${#lists.isEmpty(submissions)}" style="padding:40px; text-align:center; background: var(--bg-cream); border-radius: 12px;">
            <p style="color: var(--sage); font-size: 0.95rem; margin-bottom: 0;">No recycling submissions found yet.</p>
          </div>
          
          <div th:unless="${#lists.isEmpty(submissions)}" style="display:flex; flex-direction:column; gap:12px;">
            <div th:each="sub : ${submissions}" 
                 style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--bg-cream); border: 1px solid var(--cream-dark); border-radius: 10px;">
              <div>
                <p style="font-weight:700; color:var(--forest); font-size: 1rem; margin: 0;" th:text="${sub.station.name}">Station</p>
                <p style="font-size:0.8rem; color:var(--sage); margin: 4px 0 0;" th:text="${#temporals.format(sub.submittedAt, 'dd MMM yyyy, HH:mm')}">Date</p>
              </div>
              <div style="text-align: right;">
                <span th:text="${sub.status}" 
                      th:class="${sub.status.name() == 'CONFIRMED' ? 'badge-confirmed' : 'badge-pending'}"
                      style="display: inline-block; font-size: 0.65rem; padding: 3px 10px; margin-bottom: 6px;">STATUS</span>
                <p style="font-family:'Syne',sans-serif; font-weight:800; color:var(--forest); margin:0;" th:text="'+' + ${sub.pointsEarned} + ' pts'">+0 pts</p>
              </div>
            </div>
          </div>
        </div>

        <!-- My Rewards / Vouchers -->
        <div style="background: white; border-radius: 16px; border: 1px solid var(--cream-dark); padding: 32px;">
          <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:24px; border-bottom: 1px solid var(--cream-dark); padding-bottom: 12px;">
            <h2 style="font-family:'Syne',sans-serif; font-size: 1.25rem; color: var(--forest); margin: 0;">My Vouchers</h2>
            <a href="/rewards" style="font-size: 0.8rem; color: var(--forest); font-weight: 700; text-decoration: underline;">Shop Rewards</a>
          </div>

          <div th:if="${#lists.isEmpty(redemptions)}" style="padding:40px; text-align:center; background: var(--bg-cream); border-radius: 12px;">
            <p style="color: var(--sage); font-size: 0.95rem; margin: 0;">You haven't redeemed any rewards yet.</p>
          </div>

          <div th:unless="${#lists.isEmpty(redemptions)}" style="display:flex; flex-direction:column; gap:20px;">
            <div th:each="r : ${redemptions}" 
                 style="background: white; border-radius: 12px; border: 1px solid var(--cream-dark); padding: 20px; transition: transform 0.2s;">
              <div style="display:flex; align-items:flex-start; gap:16px;">
                <span style="font-size: 2rem; background: var(--bg-cream); width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 10px;" th:text="${r.reward.icon}">🎁</span>
                <div style="flex: 1;">
                   <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                     <div>
                       <h3 style="font-size: 1rem; font-weight: 800; margin: 0; color: var(--forest);" th:text="${r.reward.name}">Reward</h3>
                       <p style="font-size:0.75rem; color:var(--sage); margin: 2px 0 0;" th:text="${r.reward.provider}">Provider</p>
                     </div>
                     <span th:text="${r.status}" 
                           th:class="${r.status.name() == 'ACTIVE' ? 'badge-confirmed' : (r.status.name() == 'USED' ? 'badge-pending' : 'badge-rejected')}" 
                           style="font-size:0.6rem; padding: 2px 8px; color: var(--forest); font-weight: 800;">STATUS</span>
                   </div>
                   
                   <div style="background: var(--bg-cream); padding: 12px; border-radius: 8px; border: 1px dashed var(--cream-dark); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                     <code style="font-size: 1.1rem; color: var(--forest); font-weight: 800; letter-spacing: 1px;" th:text="${r.voucherCode}">CODE</code>
                     <p th:if="${r.status.name() == 'ACTIVE'}" style="font-size: 0.65rem; color: var(--sage); margin: 0; text-align: right;">
                        Expires: <br/><strong th:text="${#temporals.format(r.expiresAt, 'dd MMM yyyy')}">Date</strong>
                     </p>
                   </div>

                   <!-- Mark as Used Button -->
                   <div th:if="${r.status.name() == 'ACTIVE'}">
                     <form th:action="@{/rewards/{id}/mark-used(id=${r.id})}" method="post">
                       <button type="submit" class="btn-primary" 
                               style="width: 100%; padding: 10px; font-size: 0.8rem; background: var(--forest); border-color: var(--forest); color: white !important; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center;">
                         Mark as Used
                       </button>
                     </form>
                   </div>
                   <p th:if="${r.status.name() == 'USED'}" style="font-size: 0.75rem; color: var(--sage); text-align: center; margin: 0; opacity: 0.6;">
                     Used on <span th:text="${#temporals.format(r.redeemedAt, 'dd MMM yyyy')}">date</span>
                   </p>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
