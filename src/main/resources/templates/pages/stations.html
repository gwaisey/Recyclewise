<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-cream">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main>

  <section class="dashboard-hero" style="padding: 48px 0; background: var(--forest);">
    <div class="container">
      <div style="max-width: 600px;">
        <h1 style="font-family:'Syne',sans-serif; color:white; font-size: 2.2rem; margin:0;">Trash Stations</h1>
        <p style="color:rgba(255,255,255,0.7); margin-top: 12px; font-size: 1.1rem; line-height: 1.6;">
          Find an organized trash station near you and submit your waste to earn reward points.
        </p>
      </div>
    </div>
  </section>

  <section style="padding: 60px 0;">
    <div class="container">

      <!-- Points Legend -->
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 48px;">
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--cream-dark); display: flex; align-items: center; gap: 16px;">
          <div style="font-size: 1.8rem;">♻</div>
          <div>
            <p style="font-size: 0.65rem; text-transform: uppercase; font-weight: 800; color: var(--sage); margin-bottom: 2px;">Recyclable</p>
            <p style="font-weight: 700; color: var(--forest);" th:text="${multipliers.get('RECYCLABLES')} + ' pts/kg'">15 pts/kg</p>
          </div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--cream-dark); display: flex; align-items: center; gap: 16px;">
          <div style="font-size: 1.8rem;">🌿</div>
          <div>
            <p style="font-size: 0.65rem; text-transform: uppercase; font-weight: 800; color: var(--sage); margin-bottom: 2px;">Organic</p>
            <p style="font-weight: 700; color: var(--forest);" th:text="${multipliers.get('ORGANIC')} + ' pts/kg'">10 pts/kg</p>
          </div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--cream-dark); display: flex; align-items: center; gap: 16px;">
          <div style="font-size: 1.8rem;">⚠️</div>
          <div>
            <p style="font-size: 0.65rem; text-transform: uppercase; font-weight: 800; color: var(--sage); margin-bottom: 2px;">Hazardous</p>
            <p style="font-weight: 700; color: var(--forest);" th:text="${multipliers.get('HAZARDOUS')} + ' pts/kg'">20 pts/kg</p>
          </div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--cream-dark); display: flex; align-items: center; gap: 16px;">
          <div style="font-size: 1.8rem;">🗑</div>
          <div>
            <p style="font-size: 0.65rem; text-transform: uppercase; font-weight: 800; color: var(--sage); margin-bottom: 2px;">General</p>
            <p style="font-weight: 700; color: var(--forest);" th:text="${multipliers.get('GENERAL')} + ' pts/kg'">5 pts/kg</p>
          </div>
        </div>
      </div>

      <div class="items-grid">
        <div th:each="station : ${stations}" class="item-card station-card">
          <div class="item-header">
            <span class="item-emoji" th:text="${station.icon}">🏢</span>
            <span class="item-bin-badge" style="background: var(--forest);" th:text="${station.district}">District</span>
          </div>
          <h3 class="item-name" th:text="${station.name}">Station Name</h3>
          <p class="item-hint">
            <span style="display: block; margin-bottom: 4px;">📍 <span th:text="${station.address}">Address</span></span>
            <span>🕒 <span th:text="${station.operatingHours}">Hours</span></span>
          </p>
          <a th:href="@{/stations/{id}/submit(id=${station.id})}" class="btn-primary" style="margin-top: 12px; width: 100%; justify-content: center; white-space: nowrap;">
            Submit Trash Here →
          </a>
        </div>
      </div>

    </div>
  </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
