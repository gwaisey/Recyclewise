<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:60px 24px; background:#f5f2eb;">
  <div style="background:white; border-radius:20px; padding:48px 44px; width:100%; max-width:440px; box-shadow:0 12px 48px rgba(13,43,26,0.15); border:1px solid #e8e4d9;">

    <div style="text-align:center; margin-bottom:36px;">
      <div style="font-size:2.8rem; margin-bottom:12px;">♻</div>
      <h1 style="font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; color:#0d2b1a; margin-bottom:6px;">Welcome Back</h1>
      <p style="color:#7a8c7e; font-size:0.9rem;">Log in to track your recycling impact</p>
    </div>

    <div th:if="${success}" style="background:#dcfce7; border:1px solid #16a34a; color:#14532d; padding:12px 16px; border-radius:10px; font-size:0.875rem; margin-bottom:20px;" th:text="${success}"></div>
    <div th:if="${error}" style="background:#fee2e2; border:1px solid #dc2626; color:#7f1d1d; padding:12px 16px; border-radius:10px; font-size:0.875rem; margin-bottom:20px;" th:text="${error}"></div>

    <form action="/login" method="post" style="display:flex; flex-direction:column; gap:16px;">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#4a5c4e;">Username</label>
        <input type="text" name="username" placeholder="your_username" required
          style="padding:13px 16px; border:2px solid #e8e4d9; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; background:#f5f2eb;"
          onfocus="this.style.borderColor='#2d6a4f'; this.style.background='white'"
          onblur="this.style.borderColor='#e8e4d9'; this.style.background='#f5f2eb'" />
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <label style="font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#4a5c4e;">Password</label>
        <input type="password" name="password" placeholder="••••••••" required
          style="padding:13px 16px; border:2px solid #e8e4d9; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; background:#f5f2eb;"
          onfocus="this.style.borderColor='#2d6a4f'; this.style.background='white'"
          onblur="this.style.borderColor='#e8e4d9'; this.style.background='#f5f2eb'" />
      </div>
      <button type="submit"
        style="background:#0d2b1a; color:#b7f34d; font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; padding:14px 24px; border-radius:100px; border:none; cursor:pointer; margin-top:4px;"
        onmouseover="this.style.background='#2d6a4f'"
        onmouseout="this.style.background='#0d2b1a'">
        Log In →
      </button>
    </form>

    <div style="display:flex; align-items:center; gap:12px; margin:28px 0;">
      <div style="flex:1; height:1px; background:#e8e4d9;"></div>
      <span style="font-size:0.8rem; color:#a0b0a4; white-space:nowrap;">Don't have an account?</span>
      <div style="flex:1; height:1px; background:#e8e4d9;"></div>
    </div>

    <div style="background:#f5f2eb; border-radius:14px; padding:20px; text-align:center;">
      <p style="font-size:0.85rem; color:#4a5c4e; margin-bottom:14px; line-height:1.5;">Join RecycleWise and start earning points for recycling 🌱</p>
      <a href="/register"
        style="display:block; color:#0d2b1a; font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; padding:12px 24px; border-radius:100px; border:2px solid #0d2b1a; text-align:center;"
        onmouseover="this.style.background='#0d2b1a'; this.style.color='#b7f34d'"
        onmouseout="this.style.background='transparent'; this.style.color='#0d2b1a'">
        Create Free Account
      </a>
    </div>

  </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
