<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main>
  <section class="page-hero">
    <div class="container">
      <div class="page-hero-content">
        <h1>📍 Trash Stations</h1>
        <p>Find an organized trash station near you and submit your waste to earn points</p>
      </div>
    </div>
  </section>
  <section class="stations-section">
    <div class="container">
      <div class="multiplier-banner">
        <h3>💡 How Points Are Calculated</h3>
        <div class="multiplier-grid">
          <div class="mult-card"><span>♻</span><strong>Recyclable</strong><span class="mult-val" th:text="${multipliers.get('RECYCLABLE')} + ' pts/kg'">15 pts/kg</span></div>
          <div class="mult-card"><span>🌿</span><strong>Organic</strong><span class="mult-val" th:text="${multipliers.get('ORGANIC')} + ' pts/kg'">10 pts/kg</span></div>
          <div class="mult-card"><span>⚠️</span><strong>Hazardous</strong><span class="mult-val" th:text="${multipliers.get('HAZARDOUS')} + ' pts/kg'">20 pts/kg</span></div>
          <div class="mult-card"><span>🗑</span><strong>General</strong><span class="mult-val" th:text="${multipliers.get('GENERAL')} + ' pts/kg'">5 pts/kg</span></div>
        </div>
      </div>
      <div class="stations-grid">
        <div class="station-card" th:each="station : ${stations}">
          <div class="station-header">
            <span class="station-emoji" th:text="${station.icon}">🏢</span>
            <div class="station-badge" th:text="${station.district}">District</div>
          </div>
          <h3 class="station-name" th:text="${station.name}">Station Name</h3>
          <p class="station-address">📍 <span th:text="${station.address}">Address</span></p>
          <p class="station-hours">🕐 <span th:text="${station.operatingHours}">Hours</span></p>
          <a th:href="@{/stations/{id}/submit(id=${station.id})}" class="btn-station-submit">Submit Trash Here →</a>
        </div>
      </div>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
