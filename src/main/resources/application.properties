spring.profiles.include=local
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Database Configuration
# Local: Uses H2 (in-memory or file)
# Production: Set DATABASE_URL environment variable to PostgreSQL connection string
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:recyclewise;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
server.error.include-message=always

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

openrouter.api.key=${OPENROUTER_API_KEY:not-configured}
