<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-cream">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main>

  <!-- Admin Hero -->
  <section class="dashboard-hero" style="padding: 36px 0;">
    <div class="container mobile-center" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
      <div>
        <p style="color:rgba(255,255,255,0.4); font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:4px;">Super Admin</p>
        <h1 style="color:var(--white); font-size:1.8rem; margin: 0;">Admin Dashboard</h1>
        <p style="color:rgba(255,255,255,0.6); font-size:0.85rem; margin-top: 4px;">Welcome back, <span th:text="${adminName}">Admin</span></p>
      </div>
      <div style="display:flex; gap:12px;">
        <a href="/admin/submissions" class="btn-primary" style="padding: 10px 20px; font-size: 0.8rem;">View Submissions</a>
        <a href="/admin/logout" class="btn-outline" style="background:rgba(255,255,255,0.08); color:var(--white); border-color: rgba(255,255,255,0.2); padding: 10px 20px; font-size: 0.8rem;">Logout</a>
      </div>
    </div>
  </section>

  <section style="padding: 40px 0 100px;">
    <div class="container">

      <!-- Stats Grid -->
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 48px;">
        <div class="detail-card" style="border-left: none; border: 1px solid var(--cream-dark); padding: 24px;">
          <p style="font-size:0.75rem; color:var(--sage); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; opacity: 0.7;">Pending Review</p>
          <p style="font-size:2.5rem; font-weight:800; color:var(--forest);" th:text="${totalPending}">0</p>
        </div>
        <div class="detail-card" style="border-left: 5px solid var(--bin-green); border-top: 1px solid var(--cream-dark); border-right: 1px solid var(--cream-dark); border-bottom: 1px solid var(--cream-dark); padding: 24px;">
          <p style="font-size:0.75rem; color:var(--sage); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; opacity: 0.7;">Confirmed</p>
          <p style="font-size:2.5rem; font-weight:800; color:var(--bin-green);" th:text="${totalConfirmed}">0</p>
        </div>
        <div class="detail-card" style="border-left: 5px solid var(--bin-red); border-top: 1px solid var(--cream-dark); border-right: 1px solid var(--cream-dark); border-bottom: 1px solid var(--cream-dark); padding: 24px;">
          <p style="font-size:0.75rem; color:var(--sage); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; opacity: 0.7;">Rejected</p>
          <p style="font-size:2.5rem; font-weight:800; color:var(--bin-red);" th:text="${totalRejected}">0</p>
        </div>
      </div>

      <!-- Staff Management -->
      <div class="detail-card" style="border-left: none; border: 1px solid var(--cream-dark); padding: 40px;">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <h2 style="font-size: 1.3rem; margin-bottom: 24px;">Station Staff Management</h2>

        <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:48px;">
          <div th:each="staff : ${staffList}"
               style="display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--cream); border: 1px solid var(--cream-dark); border-radius:14px; flex-wrap:wrap; gap:16px;">
            <div style="display:flex; align-items:center; gap:16px;">
              <div style="width:40px; height:40px; background:var(--forest); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--lime); font-family:'Syne',sans-serif; font-weight:800; font-size:0.9rem;"
                   th:text="${#strings.substring(staff.fullName, 0, 1)}">A</div>
              <div>
                <p style="font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; color:var(--forest); margin:0;" th:text="${staff.fullName}">Name</p>
                <p style="font-size:0.8rem; color:var(--sage); margin:0; opacity: 0.7;" th:text="${staff.email}">email</p>
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:16px;">
              <span class="badge-pending" style="background: var(--white); border: 1px solid var(--cream-dark);"
                    th:text="${staff.assignedStation != null ? staff.assignedStation.name : 'Unassigned'}">Station</span>
              
              <div style="display:flex; align-items:center; gap:8px;">
                <span th:if="${staff.active}" class="badge-confirmed">ACTIVE</span>
                <span th:unless="${staff.active}" class="badge-rejected">INACTIVE</span>
                
                <form th:action="@{/admin/staff/{id}/{action}(id=${staff.id}, action=${staff.active ? 'deactivate' : 'reactivate'})}" method="post">
                  <button type="submit" class="btn-outline" style="padding: 6px 16px; font-size: 0.75rem; color: var(--forest); border-color: var(--forest);"
                          th:text="${staff.active ? 'Deactivate' : 'Reactivate'}"
                          th:onclick="'return confirm(\'' + (${staff.active ? 'Deactivate' : 'Reactivate'}) + ' this staff account?\')'">Action</button>
                </form>
              </div>
            </div>
          </div>
        </div>

        <!-- Add Staff Form -->
        <div style="border-top: 1px solid var(--cream-dark); padding-top: 40px;">
          <h3 style="font-size: 1.1rem; margin-bottom: 20px;">Add New Station Staff</h3>
          <form action="/admin/staff/create" method="post" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) auto; gap:16px; align-items:end;">
            <div style="display:flex; flex-direction:column; gap:8px;">
              <label style="font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--forest);">Full Name</label>
              <input type="text" name="fullName" placeholder="Budi Santoso" required
                style="padding:12px; border:1px solid var(--cream-dark); border-radius:10px; font-size:0.9rem; outline:none; background:var(--white);" />
            </div>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <label style="font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--forest);">Email</label>
              <input type="email" name="email" placeholder="staff@recyclewise.id" required
                style="padding:12px; border:1px solid var(--cream-dark); border-radius:10px; font-size:0.9rem; outline:none; background:var(--white);" />
            </div>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <label style="font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--forest);">Station</label>
              <select name="stationId" required
                style="padding:12px; border:1px solid var(--cream-dark); border-radius:10px; font-size:0.9rem; outline:none; background:var(--white);">
                <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name}">Station</option>
              </select>
            </div>
            <button type="submit" class="btn-primary" style="padding: 13px 24px;">+ Add Member</button>
          </form>
          <p style="font-size:0.75rem; color:var(--sage); margin-top:16px; opacity:0.6;">Default password configured by system — user must change upon first login.</p>
        </div>
      </div>

    </div>
  </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
