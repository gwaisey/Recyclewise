<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecycleWise - Waste and Recycling Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
<nav th:fragment="navbar" class="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <span class="logo-leaf">♻</span>
            <span class="logo-text">RecycleWise</span>
        </a>
        <ul class="nav-links">
            <li><a href="/" th:classappend="${activePage == 'home'} ? 'active'">Home</a></li>
            <li><a href="/guide" th:classappend="${activePage == 'guide'} ? 'active'">Waste Guide</a></li>
            <li><a href="/tips" th:classappend="${activePage == 'tips'} ? 'active'">Eco Tips</a></li>
            <li th:if="${session.userId != null}"><a href="/stations" th:classappend="${activePage == 'stations'} ? 'active'">Stations</a></li>
            <li th:if="${session.userId != null}"><a href="/rewards" th:classappend="${activePage == 'rewards'} ? 'active'">Rewards</a></li>
            <li th:if="${session.userId != null}"><a href="/dashboard" th:classappend="${activePage == 'dashboard'} ? 'active'">Dashboard</a></li>
            <li th:if="${session.userId != null}"><a href="/logout" style="color: rgba(255,255,255,0.5);">Logout</a></li>
            <li th:if="${session.userId == null}"><a href="/login">Login</a></li>
            <li th:if="${session.userId == null}"><a href="/register" style="background: var(--lime); color: var(--forest); border-radius: 100px; padding: 8px 18px;">Register</a></li>
        </ul>
        <button class="nav-toggle" onclick="toggleNav()">☰</button>
    </div>
</nav>
</body>
</html>
