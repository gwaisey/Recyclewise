# Production Profile
# Activate by setting: SPRING_PROFILES_ACTIVE=production in Koyeb

# Note: DATABASE_URL must be in format: jdbc:postgresql://host/db?options
# If using Neon, change postgresql:// to jdbc:postgresql:// in your connection string
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost/recyclewise}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-test-query=SELECT 1
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.thymeleaf.cache=true
