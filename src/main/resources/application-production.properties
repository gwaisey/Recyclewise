# Production Profile
# Activate by setting: SPRING_PROFILES_ACTIVE=production in Koyeb
# 
# Option 1: Set full DATABASE_URL (URL-encode password if it contains special chars)
# Option 2: Set individual properties below

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
spring.thymeleaf.cache=true
